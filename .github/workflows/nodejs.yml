name: Node.js CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [18.x]

    steps:
    - uses: actions/checkout@v4
    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}

    - name: Install dependencies
      run: npm ci

    - name: Lint (basic)
      run: |
        # no linter configured; run a simple syntax check
        node -e "require('fs'); console.log('basic syntax check')"

    - name: Run bot smoke test (no network)
      run: |
        # This action does not start the bot against a real Minecraft server.
        # It simply loads modules to detect obvious syntax errors.
        node -e "import('./src/bot.js').then(()=>console.log('loaded')).catch(err=>{console.error(err); process.exit(2)})"
